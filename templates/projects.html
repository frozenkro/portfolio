{{define "subContent"}}
<section class="subcontent-header">
  <h1 class="page-title">PROJECTS</h1>
  <p class="page-subtitle">things I've built.</p>
</section>

<div class="subcontent-grid">
  {{ range .Projects }}
    <div class="subcontent-card">
      <h3>{{ .Title }}</h3>
      <p>{{ .Description }}</p>
      {{ range .Tags }}
      <span>{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}
</div>
{{end}}
