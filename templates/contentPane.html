{{define "content"}}
  <div class="content">
    <div class="panel c-panel">
      <nav class="navrow">
        {{ range .NavItems }}
        <span {{ if .Last }}id="lastNavBtn" {{ end }}class="nav-item{{ if .Active }} nav-item-active{{ end }}">
          <a href="{{ .Route }}">{{ .Title }}</a>
        </span>
        {{ end }}
      </nav>
      <main>
        {{block "subContent" .}}{{end}}
      </main>
    </div>
  </div>
{{end}}
